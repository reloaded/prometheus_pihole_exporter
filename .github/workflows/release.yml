name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify tag is signed
        run: |
          if ! git tag -v "${GITHUB_REF_NAME}" 2>&1 | grep -q "Good signature"; then
            echo "::warning::tag ${GITHUB_REF_NAME} is not GPG-signed; continuing anyway"
          fi

      - name: Determine release flavour
        id: flavour
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          TAG: ${{ github.ref_name }}
          PRERELEASE: ${{ steps.flavour.outputs.prerelease }}
        run: |
          # Always: full semver + sha
          tags="ghcr.io/${{ github.repository }}:${TAG}"
          tags="${tags},ghcr.io/${{ github.repository }}:sha-${GITHUB_SHA::7}"

          if [ "${PRERELEASE}" = "false" ]; then
            # Strip leading v and split into MAJOR.MINOR.PATCH
            ver="${TAG#v}"
            major="${ver%%.*}"
            minor_patch="${ver#*.}"
            minor="${minor_patch%%.*}"
            tags="${tags},ghcr.io/${{ github.repository }}:v${major}.${minor}"
            tags="${tags},ghcr.io/${{ github.repository }}:v${major}"
            tags="${tags},ghcr.io/${{ github.repository }}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build + push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
          provenance: true
          sbom: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ steps.flavour.outputs.prerelease == 'true' }}
